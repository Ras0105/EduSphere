<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Verify OTP</h1>
    <p>Enter the 6 digit otp sent to your registered email</p>
    <form action="/verify-otp" method="POST">

        <input

            type="text"

            name="otp"

            maxlength="6"

            placeholder="Enter OTP"

            required>

        <br><br>

        <button type="submit">

          Verify OTP

        </button>
        {% if message %}
        <p style="color:red;">
            {{ message }}
        </p>
        {% endif %}

    </form>
    <a href="/resend-otp">
        <button type="button">
            Resend OTP
        </button>
    </a>
    <h3>
        OTP expires in:
        <span id="timer">02:00</span>
    </h3>
    
<script>let expiryTime = Number("{{ expiry_time }}") * 1000;</script>
<script src="{{ url_for('static', path='js/register.js') }}"></script>
</body>
</html>
